name: 'Gemini Dataform Generator'

on:
  pull_request:
    branches:
      - dev
    paths:
      - 'requirements/**.txt'

env:
  GCP_PROJECT_ID: 'ats-theme-dmo-b2bdatacolab'
  GCP_REGION: 'asia-northeast1'

jobs:
  gemini-generate:
    name: 'Generate Dataform files with Gemini CLI'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Gemini CLI
      run: npm install -g @google/gemini-cli@0.32.1

    - name: Find changed requirement files
      id: find_requirements
      run: |
        CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'requirements/*.txt')
        echo "changed_files=$CHANGED" >> $GITHUB_OUTPUT
        echo "Changed requirement files:"
        echo "$CHANGED"

    - name: Generate spec documents
      if: steps.find_requirements.outputs.changed_files != ''
      run: |
        mkdir -p docs
        for req_file in ${{ steps.find_requirements.outputs.changed_files }}; do
          TABLE_NAME=$(basename $req_file .txt)
          echo "Generating spec for: $TABLE_NAME"

          gemini -p "$(cat prompts/generate_doc.txt)

        Important constraints:
        - Dataset must be: dev_dataform_dataset
        - Project must be: ${{ env.GCP_PROJECT_ID }}
        - Source dataset must be: aiready

        Requirement:
        $(cat $req_file)

        Template:
        $(cat templates/document_template.md)" > docs/${TABLE_NAME}_spec.md

          echo "Generated: docs/${TABLE_NAME}_spec.md"
        done

    - name: Generate SQLX files
      if: steps.find_requirements.outputs.changed_files != ''
      run: |
        mkdir -p dataform/definitions/staging
        for req_file in ${{ steps.find_requirements.outputs.changed_files }}; do
          TABLE_NAME=$(basename $req_file .txt)
          echo "Generating SQLX for: $TABLE_NAME"

          OUTPUT=$(gemini -p "$(cat prompts/generate_sqlx.txt)

        Important constraints:
        - Dataset must be: dev_dataform_dataset
        - Project must be: ${{ env.GCP_PROJECT_ID }}
        - Test config must include: type: 'test' AND dataset: '$TABLE_NAME'
        - Use single quotes for strings in BigQuery SQL

        Specification:
        $(cat docs/${TABLE_NAME}_spec.md)

        SQLX Template:
        $(cat templates/sqlx_template.sqlx)")

          echo "$OUTPUT" | awk '/===SEPARATOR===/{found=1; next} !found{print > "dataform/definitions/staging/'$TABLE_NAME'.sqlx"} found{print > "dataform/definitions/staging/'$TABLE_NAME'_test.sqlx"}'

          echo "Generated: dataform/definitions/staging/${TABLE_NAME}.sqlx"
          echo "Generated: dataform/definitions/staging/${TABLE_NAME}_test.sqlx"
        done

    - name: Commit generated files
      if: steps.find_requirements.outputs.changed_files != ''
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/ dataform/definitions/staging/
        git diff --staged --quiet || git commit -m "feat: auto-generate Dataform files from requirements [skip ci]"
        git push

    - name: Comment on PR
      uses: actions/github-script@v7
      if: steps.find_requirements.outputs.changed_files != ''
      with:
        script: |
          const files = `${{ steps.find_requirements.outputs.changed_files }}`.trim().split('\n');
          const tableNames = files.map(f => f.replace('requirements/', '').replace('.txt', ''));

          const output = `### Gemini Dataform Generator

          Generated files for: **${tableNames.join(', ')}**

          | File | Status |
          |------|--------|
          ${tableNames.map(t => `| \`docs/${t}_spec.md\` | ✅ Generated |`).join('\n')}
          ${tableNames.map(t => `| \`dataform/definitions/staging/${t}.sqlx\` | ✅ Generated |`).join('\n')}
          ${tableNames.map(t => `| \`dataform/definitions/staging/${t}_test.sqlx\` | ✅ Generated |`).join('\n')}

          *Generated by Gemini CLI · Triggered by @${{ github.actor }}*`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          })
