name: 'Terraform Multi-Environment CI/CD'

on:
  push:
    branches:
      - dev
      - staging
      - main
  pull_request:
    branches:
      - dev
      - staging
      - main

env:
  TF_VERSION: '1.5.0'
  TF_WORKING_DIR: './terraform'
  GCP_PROJECT_ID: 'ats-theme-dmo-b2bdatacolab'
  GCP_REGION: 'asia-northeast1'

jobs:
  # ============================================
  # JOB1: DATAFORM VALIDATION (runs on PR to dev)
  # ============================================
 dataform-validation:
    name: 'Dataform Validation'
    if: github.event_name == 'pull_request' && github.base_ref == 'dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'
    
    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2
    
    - name: Check Dataform Files
      id: check_dataform
      run: |
        if [ -d "dataform" ]; then
          echo "has_dataform=true" >> $GITHUB_OUTPUT
        else
          echo "has_dataform=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Validate dataform.json
      if: steps.check_dataform.outputs.has_dataform == 'true'
      run: |
        echo "## Dataform Configuration" >> $GITHUB_STEP_SUMMARY
        cat dataform/dataform.json | jq empty && echo "PASS: dataform.json is valid" >> $GITHUB_STEP_SUMMARY || echo "FAIL: dataform.json is invalid" >> $GITHUB_STEP_SUMMARY
    
    - name: Validate SQLX Files
      if: steps.check_dataform.outputs.has_dataform == 'true'
      run: |
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## SQLX Compilation" >> $GITHUB_STEP_SUMMARY
        python scripts/validate_dataform.py | tee validation_output.txt
        
        if grep -q "Validation Complete!" validation_output.txt; then
          SQLX_COUNT=$(grep "SQLX files:" validation_output.txt | awk '{print $3}')
          COMPILED_COUNT=$(grep "Compiled:" validation_output.txt | awk '{print $2}')
          echo "PASS: Compiled $COMPILED_COUNT/$SQLX_COUNT SQLX files successfully" >> $GITHUB_STEP_SUMMARY
        else
          echo "FAIL: SQLX compilation failed" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
    
    - name: BigQuery Dry-Run
      if: steps.check_dataform.outputs.has_dataform == 'true'
      run: |
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## BigQuery Dry-Run (Syntax Check)" >> $GITHUB_STEP_SUMMARY
        bash scripts/bigquery_dryrun.sh | tee dryrun_output.txt
        
        if grep -q "Success:" dryrun_output.txt; then
          SUCCESS=$(grep "Success:" dryrun_output.txt | awk '{print $2}')
          FAILED=$(grep "Failed:" dryrun_output.txt | awk '{print $2}')
          echo "Success: $SUCCESS" >> $GITHUB_STEP_SUMMARY
          if [ "$FAILED" != "0" ]; then
            echo "Failed: $FAILED" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        fi
    
    - name: Create View for Testing
      if: steps.check_dataform.outputs.has_dataform == 'true'
      run: |
        bq mk --dataset --location=asia-northeast1 --project_id=ats-theme-dmo-b2bdatacolab dev_dataform_dataset 2>/dev/null || true
        bq query --use_legacy_sql=false --project_id=ats-theme-dmo-b2bdatacolab < scripts/compiled/sum_price.sql || true
    
    - name: Run Dataform Tests
      if: steps.check_dataform.outputs.has_dataform == 'true'
      run: |
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Data Quality Tests" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        bash scripts/test_dataform.sh | tee test_output.txt
        
        echo "| Test | Result | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|-------|" >> $GITHUB_STEP_SUMMARY
        
        if grep -q "Test 1:.*PASS" test_output.txt; then
          echo "| NULL check | PASS | No NULL values |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| NULL check | FAIL | Found NULL values |" >> $GITHUB_STEP_SUMMARY
        fi
        
        if grep -q "Test 2:.*PASS" test_output.txt; then
          PRICE=$(grep "Test 2:.*PASS" test_output.txt | grep -oP 'total_price = \K[0-9.]+')
          echo "| total_price <= 100 | PASS | $PRICE |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| total_price <= 100 | FAIL | Exceeds 100 |" >> $GITHUB_STEP_SUMMARY
        fi
        
        if grep -q "Test 3:.*PASS" test_output.txt; then
          PRICE=$(grep "Test 3:.*PASS" test_output.txt | grep -oP 'total_price = \K[0-9.]+')
          echo "| total_price >= 0 | PASS | $PRICE |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| total_price >= 0 | FAIL | Negative value |" >> $GITHUB_STEP_SUMMARY
        fi
        
        if grep -q "Test 4:.*PASS" test_output.txt; then
          COUNT=$(grep "Test 4:.*PASS" test_output.txt | grep -oP 'record_count = \K[0-9]+')
          echo "| record_count > 0 | PASS | $COUNT |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| record_count > 0 | FAIL | No records |" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        if grep -q "All tests passed!" test_output.txt; then
          echo "### Result: All tests passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "### Result: Some tests failed" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi

  # ============================================
  # JOB 2: PLAN (runs on Pull Request)
  # ============================================
  plan:
    name: 'Terraform Plan'
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    # Determine environment from PR target branch
    - name: Determine Environment
      id: env
      run: |
        if [[ "${{ github.base_ref }}" == "main" ]]; then
          echo "environment=prod" >> $GITHUB_OUTPUT
          echo "Target: PRODUCTION" >> $GITHUB_STEP_SUMMARY
        elif [[ "${{ github.base_ref }}" == "staging" ]]; then
          echo "environment=staging" >> $GITHUB_OUTPUT
          echo "Target: STAGING" >> $GITHUB_STEP_SUMMARY
        else
          echo "environment=dev" >> $GITHUB_OUTPUT
          echo "Target: DEVELOPMENT" >> $GITHUB_STEP_SUMMARY
        fi
    
    - name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
    
    - name: Terraform Init
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: terraform init
    
    - name: Terraform Format Check
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: terraform fmt -check
      continue-on-error: true
    
    - name: Terraform Validate
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: terraform validate
    
    - name: Terraform Plan
      id: plan
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: |
        terraform plan \
          -var="project_id=${{ env.GCP_PROJECT_ID }}" \
          -var="region=${{ env.GCP_REGION }}" \
          -var="environment=${{ steps.env.outputs.environment }}" \
          -out=tfplan \
          -no-color
      continue-on-error: true
    
    # Save plan as artifact
    - name: Upload Plan Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tfplan-${{ steps.env.outputs.environment }}-${{ github.run_number }}
        path: terraform/tfplan
        retention-days: 5
    
    # Show plan in summary
    - name: Show Plan Summary
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: |
        echo "## Terraform Plan - ${{ steps.env.outputs.environment }} Environment" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Plan Output:" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
    
    # Comment plan on PR (optional but nice)
    - name: Comment Plan on PR
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      env:
        PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
      with:
        script: |
          const output = `### Terraform Plan - ${{ steps.env.outputs.environment }} Environment
          
          #### Terraform Initialization \`${{ steps.init.outcome }}\`
          #### Terraform Validation \`${{ steps.validate.outcome }}\`
          #### Terraform Plan \`${{ steps.plan.outcome }}\`
          
          <details><summary>Show Plan</summary>
          
          \`\`\`terraform
          ${process.env.PLAN}
          \`\`\`
          
          </details>
          
          *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          })

  # ============================================
  # JOB 3: APPLY (runs on Push/Merge)
  # ============================================
  apply:
    name: 'Terraform Apply'
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    # Determine environment from branch
    - name: Determine Environment
      id: env
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "environment=prod" >> $GITHUB_OUTPUT
          echo "Deploying to: PRODUCTION" >> $GITHUB_STEP_SUMMARY
        elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
          echo "environment=staging" >> $GITHUB_OUTPUT
          echo "Deploying to: STAGING" >> $GITHUB_STEP_SUMMARY
        else
          echo "environment=dev" >> $GITHUB_OUTPUT
          echo "Deploying to: DEVELOPMENT" >> $GITHUB_STEP_SUMMARY
        fi
    
    - name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
    
    - name: Terraform Init
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: terraform init
    
    - name: Terraform Plan
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: |
        terraform plan \
          -var="project_id=${{ env.GCP_PROJECT_ID }}" \
          -var="region=${{ env.GCP_REGION }}" \
          -var="environment=${{ steps.env.outputs.environment }}" \
          -out=tfplan
    
    - name: Terraform Apply
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: terraform apply -auto-approve tfplan
    
    - name: Terraform Output
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: |
        echo "## Deployment Complete - ${{ steps.env.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Outputs:" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        terraform output >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
