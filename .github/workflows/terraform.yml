name: 'Terraform Deploy to GCP'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Manual trigger

env:
  TF_VERSION: '1.5.0'
  TF_WORKING_DIR: './terraform'
  GCP_PROJECT_ID: 'ats-theme-dmo-b2bdatacolab'
  GCP_REGION: 'asia-northeast1'

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    
    # Permissions needed for OIDC
    permissions:
      contents: read
      id-token: write
    
    steps:
    # Checkout code
    - name: Checkout
      uses: actions/checkout@v4
    
    # Authenticate to GCP using Workload Identity Federation
    - name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
        service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
    
    # Setup Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
    
    # Terraform Init
    - name: Terraform Init
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: terraform init
    
    # Terraform Format Check
    - name: Terraform Format
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: terraform fmt -check
      continue-on-error: true
    
    # Terraform Validate
    - name: Terraform Validate
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: terraform validate
    
    # Terraform Plan
    - name: Terraform Plan
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: terraform plan -var="project_id=${{ env.GCP_PROJECT_ID }}" -var="region=${{ env.GCP_REGION }}"
    
    # Terraform Apply (only on main branch)
    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: terraform apply -auto-approve -var="project_id=${{ env.GCP_PROJECT_ID }}" -var="region=${{ env.GCP_REGION }}"
    
    # Show Outputs
    - name: Terraform Output
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: terraform output
